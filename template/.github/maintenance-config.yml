# Maintenance Automation Configuration
# Generated by Phase 9 — Operationalize (/operationalize)
# Re-run /operationalize to update these settings via interview.

# ─── Automation Depth ───
automation:
  # Which Phase 8 level runs automatically: light | standard | deep
  level: "[INTERVIEW-REQUIRED]"
  # Should automated maintenance create PRs for fixes or just report?
  auto_fix_mode: "report" # report | pr
  # Maximum auto-fix scope: formatting | formatting+deps | all
  auto_fix_scope: "formatting"

# ─── Lint Schedule ───
lint:
  enabled: false
  schedule: "0 9 * * 1" # Weekly Monday 9am UTC (cron)
  mode: "advisory" # advisory | blocking
  # Commands sourced from workflow/COMMANDS.md at generation time

# ─── Documentation Compliance ───
docs:
  enabled: false
  schedule: "0 9 1 * *" # Monthly 1st at 9am UTC
  checks:
    - readme_completeness
    - constitution_alignment
    - badge_freshness

# ─── Release Publishing ───
release:
  enabled: false
  trigger: "tag" # tag | manual | both
  semver: "strict" # strict | flexible (allows pre-release labels)
  changelog: true
  # publish_targets: [] # e.g., [npm, pypi, docker, github-releases]

# ─── Dependency Monitoring ───
dependencies:
  enabled: false
  tool: "dependabot" # dependabot | renovate | manual
  auto_merge: "patch" # patch | minor | none
  schedule: "weekly" # daily | weekly | monthly

# ─── Security Scanning ───
security:
  enabled: false
  tool: "codeql" # codeql | other
  schedule: "0 9 * * 1" # Weekly Monday 9am UTC
  block_on_findings: false # true = block merges, false = advisory

# ─── Notification Routing ───
notifications:
  # At least one channel must be configured
  channels: []
  # Example channel configurations:
  # - type: email
  #   address: "team@example.com"
  #   on: [security, lint, docs]
  # - type: slack
  #   webhook_url_secret: "SLACK_WEBHOOK_URL" # GitHub secret name
  #   on: [security, release]
  # - type: github-issue
  #   labels: ["maintenance", "automated"]
  #   on: [security, deps]

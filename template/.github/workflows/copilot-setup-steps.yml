name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  policy-and-quality-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      INSTALL_CMD: "echo 'Set INSTALL_CMD in workflow env'"
      BUILD_CMD: "echo 'Set BUILD_CMD in workflow env'"
      LINT_CMD: "echo 'Set LINT_CMD in workflow env'"
      TEST_CMD: "echo 'Set TEST_CMD in workflow env'"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run scaffold policy checks
        run: |
          set -euo pipefail
          chmod +x template/scripts/policy-check.sh || true
          if [ -f scripts/policy-check.sh ]; then
            scripts/policy-check.sh
          elif [ -f template/scripts/policy-check.sh ]; then
            template/scripts/policy-check.sh
          else
            echo "policy-check.sh not found"
            exit 1
          fi

      - name: Validate spec and task templates include identity fields
        run: |
          set -euo pipefail
          if [ -f specs/_TEMPLATE.md ]; then
            grep -q "Feature ID" specs/_TEMPLATE.md
            grep -q "AC-1" specs/_TEMPLATE.md
          else
            echo "specs/_TEMPLATE.md not found — skipping"
          fi
          if [ -f tasks/_TEMPLATE.md ]; then
            grep -q "Feature ID" tasks/_TEMPLATE.md
            grep -q "T-1" tasks/_TEMPLATE.md
          else
            echo "tasks/_TEMPLATE.md not found — skipping"
          fi

      - name: Install dependencies
        run: |
          set -euo pipefail
          eval "$INSTALL_CMD"

      - name: Build project
        run: |
          set -euo pipefail
          eval "$BUILD_CMD"

      - name: Lint project
        run: |
          set -euo pipefail
          eval "$LINT_CMD"

      - name: Run tests
        run: |
          set -euo pipefail
          eval "$TEST_CMD"

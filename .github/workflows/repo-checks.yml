name: Repo Checks

on:
  push:
  pull_request:

jobs:
  scripts-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run script test suite
        run: ./scripts/test-scripts.sh

      - name: Validate scaffold structure
        run: ./scripts/validate-scaffold.sh

      - name: Validate prompt derivation drift
        run: ./scripts/sync-prompts.sh --check
